<!doctype html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Sanapato</title>
    <style>
      :root { color-scheme: light; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #f4f1ea;
        font-family: "Helvetica Neue", Arial, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
        cursor: default;
      }
      #mute {
        position: fixed;
        top: 12px;
        right: 12px;
        width: 40px;
        height: 40px;
        padding: 0;
        border: none;
        border-radius: 8px;
        background: rgba(60, 50, 40, 0.06);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0.5;
        transition: opacity 0.15s, background 0.15s;
      }
      #mute svg {
        width: 58%;
        height: 58%;
        display: block;
      }
      #mute:hover {
        opacity: 1;
        background: rgba(60, 50, 40, 0.12);
      }
    </style>
